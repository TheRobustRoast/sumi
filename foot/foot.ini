# ╔══════════════════════════════════════════════════════════════╗
# ║  Foot Terminal — Boxy TUI Style                              ║
# ╚══════════════════════════════════════════════════════════════╝

include=~/.config/foot/colors.ini

[main]
font=JetBrainsMono Nerd Font:size=11
dpi-aware=yes
pad=8x8
initial-window-size-pixels=960x640
selection-target=both
title=foot
locked-title=no

[scrollback]
lines=10000
multiplier=3.0
indicator-position=relative
indicator-format=line

[cursor]
style=block
blink=no
beam-thickness=1.5

[mouse]
hide-when-typing=yes
alternate-scroll-mode=yes

[url]
launch=xdg-open ${url}
osc8-underline=url-mode

[bell]
urgent=yes
notify=no

[colors]
# Fallback colors — overwritten by wallust via colors.ini include
# These ensure foot launches correctly even before first wallpaper set
foreground=c8c8c8
background=0a0a0a
regular0=0a0a0a
regular1=f7768e
regular2=9ece6a
regular3=e0af68
regular4=7aa2f7
regular5=bb9af7
regular6=7dcfff
regular7=c8c8c8
bright0=3a3a3a
bright1=f7768e
bright2=9ece6a
bright3=e0af68
bright4=7aa2f7
bright5=bb9af7
bright6=7dcfff
bright7=e8e8e8

[key-bindings]
scrollback-up-page=Shift+Page_Up
scrollback-down-page=Shift+Page_Down
scrollback-up-half-page=Control+Shift+k
scrollback-down-half-page=Control+Shift+j
clipboard-copy=Control+Shift+c
clipboard-paste=Control+Shift+v
primary-paste=Shift+Insert
search-start=Control+Shift+f
font-increase=Control+plus
font-decrease=Control+minus
font-reset=Control+0
spawn-terminal=Control+Shift+n
show-urls-launch=Control+Shift+o

