# ╔══════════════════════════════════════════════════════════════╗
# ║  Yazi — TUI File Manager Config                              ║
# ║  sumi — monochrome + accent, keyboard-first               ║
# ╚══════════════════════════════════════════════════════════════╝

[manager]
ratio = [1, 3, 4]
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
linemode = "size"
show_hidden = false
show_symlink = true
scrolloff = 5

[preview]
tab_size = 2
max_width = 600
max_height = 900
image_filter = "triangle"
image_quality = 75
sixel_fraction = 15
ueberzug_scale = 1
ueberzug_offset = [0, 0, 0, 0]

[opener]
edit = [
    { run = 'nvim "$@"', block = true, for = "unix" },
]
open = [
    { run = 'xdg-open "$@"', orphan = true, for = "unix" },
]
reveal = [
    { run = 'xdg-open "$(dirname "$0")"', orphan = true, for = "unix" },
]
extract = [
    { run = 'unar "$1"', block = true, for = "unix" },
]

[open]
rules = [
    # Text/code — open in editor
    { mime = "text/*", use = "edit" },
    { mime = "application/json", use = "edit" },
    { mime = "application/toml", use = "edit" },
    { mime = "*/xml", use = "edit" },
    { mime = "application/x-shellscript", use = "edit" },

    # Media — open with system viewer
    { mime = "image/*", use = "open" },
    { mime = "video/*", use = "open" },
    { mime = "audio/*", use = "open" },

    # Documents
    { mime = "application/pdf", use = "open" },

    # Archives — extract
    { mime = "application/zip", use = "extract" },
    { mime = "application/gzip", use = "extract" },
    { mime = "application/x-tar", use = "extract" },
    { mime = "application/x-bzip2", use = "extract" },
    { mime = "application/x-xz", use = "extract" },
    { mime = "application/x-7z-compressed", use = "extract" },
    { mime = "application/x-rar", use = "extract" },

    # Fallback
    { name = "*", use = "open" },
]

[input]
cd_title  = "cd:"
cd_origin = "top-center"
cd_offset = [0, 2, 50, 3]

create_title  = ["create:", "create (dir):"]
create_origin = "top-center"
create_offset = [0, 2, 50, 3]

rename_title  = "rename:"
rename_origin = "hovered"
rename_offset = [0, 1, 50, 3]

find_title  = ["find:", "find (prev):"]
find_origin = "top-center"
find_offset = [0, 2, 50, 3]

search_title  = "grep:"
search_origin = "top-center"
search_offset = [0, 2, 50, 3]

shell_title  = ["shell:", "shell (bg):"]
shell_origin = "top-center"
shell_offset = [0, 2, 50, 3]

[select]
open_title  = "open with:"
open_origin = "hovered"
open_offset = [0, 1, 50, 7]

[log]
enabled = false
