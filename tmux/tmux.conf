# ╔══════════════════════════════════════════════════════════════╗
# ║  tmux — sumi monochrome dev multiplexer                   ║
# ║  Prefix: C-a (screen-style, easier on Caps→Esc keyboards)   ║
# ╚══════════════════════════════════════════════════════════════╝

# ── Prefix ────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── General ───────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",foot*:Tc,xterm-256color:Tc"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 0            # no delay for Esc (vi mode in zsh)
set -g focus-events on          # for nvim autoread
set -g set-clipboard on
set -g display-time 2000
set -g display-panes-time 2000

# ── Vi mode ───────────────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"
bind -T copy-mode-vi C-v send -X rectangle-toggle

# ── Splits (vim-style) ───────────────────────────────────────
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ── Navigation (vim-style, no prefix needed) ──────────────────
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# ── Resize (prefix + vim keys) ────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Window switching (Alt+number, no prefix) ──────────────────
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# ── Quick actions ─────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "config reloaded"
bind x kill-pane                # no confirm
bind X kill-window
bind z resize-pane -Z           # zoom toggle
bind Space last-window          # toggle last window
bind Tab switch-client -l       # toggle last session

# ── Dev shortcuts ─────────────────────────────────────────────
# Prefix + g = lazygit popup
bind g display-popup -d "#{pane_current_path}" -w 90% -h 85% -E "lazygit"
# Prefix + f = file manager popup
bind f display-popup -d "#{pane_current_path}" -w 90% -h 85% -E "yazi"
# Prefix + t = btop popup
bind t display-popup -w 90% -h 85% -E "btop"
# Prefix + / = fzf ripgrep in popup
bind / display-popup -d "#{pane_current_path}" -w 90% -h 85% -E \
    "rg --line-number --no-heading --color=always '' | fzf --ansi --delimiter : --preview 'bat --style=numbers --color=always {1} --highlight-line {2}' --preview-window '+{2}/3' | awk -F: '{print \"+\" \$2 \" \" \$1}' | xargs -r nvim"

# ── Session picker (prefix + p) ──────────────────────────────
bind p display-popup -w 60% -h 50% -E \
    "tmux list-sessions -F '#{session_name}' | fzf --header='switch session' | xargs -r tmux switch-client -t"

# ── Statusbar (monochrome boxy TUI) ──────────────────────────
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-justify left
set -g status-style "bg=#1a1a1a,fg=#6a6a6a"

set -g status-left-length 30
set -g status-left "#[fg=#7aa2f7,bg=#1a1a1a,bold] [#S] #[fg=#3a3a3a]│ "

set -g status-right-length 50
set -g status-right "#[fg=#3a3a3a]│#[fg=#6a6a6a] #{pane_current_path} #[fg=#3a3a3a]│#[fg=#6a6a6a] %H:%M "

# ── Window tabs ───────────────────────────────────────────────
setw -g window-status-format "#[fg=#3a3a3a] #I:#W "
setw -g window-status-current-format "#[fg=#0a0a0a,bg=#7aa2f7,bold] #I:#W "
setw -g window-status-separator ""

# ── Pane borders ──────────────────────────────────────────────
set -g pane-border-style "fg=#2a2a2a"
set -g pane-active-border-style "fg=#7aa2f7"

# ── Message / command prompt ──────────────────────────────────
set -g message-style "bg=#1a1a1a,fg=#c8c8c8"
set -g message-command-style "bg=#1a1a1a,fg=#7aa2f7"

# ── Popup style ───────────────────────────────────────────────
set -g popup-border-style "fg=#3a3a3a"
set -g popup-border-lines single

# ── Copy mode ─────────────────────────────────────────────────
setw -g mode-style "bg=#2a2a2a,fg=#c8c8c8"

# ── Wallust dynamic colors (overrides accent on wallpaper change) ──
if-shell "test -f ~/.config/sumi/tmux-colors.conf" "source-file ~/.config/sumi/tmux-colors.conf"
