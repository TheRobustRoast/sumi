# ╔══════════════════════════════════════════════════════════════╗
# ║  btop — Framework 13 AMD Ryzen 7840U tuned config          ║
# ╚══════════════════════════════════════════════════════════════╝

# Theme — wallust-generated monochrome (see wallust template)
color_theme = "sumi"

# ── UI ─────────────────────────────────────────────────────────
theme_background = false
truecolor = true
force_tty = false
vim_keys = true
rounded_corners = false
shown_boxes = cpu mem net proc
graph_symbol = braille
graph_symbol_cpu = braille
graph_symbol_mem = braille
graph_symbol_net = braille
graph_symbol_proc = braille
presets = "cpu:0:default,mem:0:default,net:0:default,proc:0:default"

# ── CPU (AMD Ryzen 7 7840U — 8C/16T Zen4) ─────────────────────
cpu_bottom = false
cpu_graph_upper = total
cpu_graph_lower = total
cpu_invert_lower = true
cpu_single_graph = false
show_coretemp = true
temp_scale = celsius
check_temp = true
show_cpu_freq = true
# k10temp for AMD Zen4
cpu_sensor = Auto

# ── Memory ─────────────────────────────────────────────────────
mem_graphs = true
mem_below_net = false
show_disks = true
show_swap = true
swap_disk = true
only_physical = true
use_fstab = true
disk_free_priv = false
zfs_arc_cached = true
show_io_stat = true
io_mode = false
io_graph_combined = false

# ── Network ────────────────────────────────────────────────────
net_download = 100
net_upload = 100
net_auto = true
net_sync = true
net_iface =

# ── Processes ──────────────────────────────────────────────────
proc_sorting = cpu lazy
proc_reversed = false
proc_tree = false
proc_colors = true
proc_gradient = false
proc_per_core = false
proc_mem_bytes = true
proc_cpu_graphs = true
proc_filter_kernel = false
proc_aggregate = false

# ── Misc ───────────────────────────────────────────────────────
update_ms = 1000
log_level = WARNING
