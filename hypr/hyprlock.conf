# ╔══════════════════════════════════════════════════════════════╗
# ║  Hyprlock — Boxy TUI Lock Screen                            ║
# ╚══════════════════════════════════════════════════════════════╝

source = ~/.config/hypr/hyprlock-colors.conf

general {
    grace = 5
    hide_cursor = true
    no_fade_in = true
    no_fade_out = true
    ignore_empty_input = true
    immediate_render = true
    fingerprint_ready_message = <span font_family="JetBrainsMono Nerd Font">[ touch sensor to unlock ]</span>
    fingerprint_present_message = <span font_family="JetBrainsMono Nerd Font">[ reading... ]</span>
}

# ── Background ───────────────────────────────────────────────
background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 8
    noise = 0.02
    brightness = 0.3
}

# ── Battery indicator (Framework 13 — visible while locked) ──
label {
    monitor =
    text = cmd[update:30000] echo "bat:$(cat /sys/class/power_supply/BAT1/capacity 2>/dev/null || echo '?')%"
    color = rgba(106, 106, 106, 1.0)
    font_size = 11
    font_family = JetBrainsMono Nerd Font
    position = 20, -20
    halign = left
    valign = top
}

# ── Box border (top) ────────────────────────────────────────
label {
    monitor =
    text = ╔══════════════════════════════════╗
    color = rgba(58, 58, 58, 1.0)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, 100
    halign = center
    valign = center
}

# ── Box title ────────────────────────────────────────────────
label {
    monitor =
    text = ║         sumi :: locked         ║
    color = $lock_accent
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, 78
    halign = center
    valign = center
}

# ── Box border (bottom of title) ────────────────────────────
label {
    monitor =
    text = ╠══════════════════════════════════╣
    color = rgba(58, 58, 58, 1.0)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, 56
    halign = center
    valign = center
}

# ── Time ─────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "║  $(date '+%Y-%m-%d  %H:%M:%S')              ║"
    color = rgba(200, 200, 200, 1.0)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, 34
    halign = center
    valign = center
}

# ── Separator ────────────────────────────────────────────────
label {
    monitor =
    text = ╠══════════════════════════════════╣
    color = rgba(58, 58, 58, 1.0)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, 12
    halign = center
    valign = center
}

# ── Input ────────────────────────────────────────────────────
input-field {
    monitor =
    size = 280, 28
    outline_thickness = 1
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgba(58, 58, 58, 1.0)
    inner_color = rgba(26, 26, 26, 1.0)
    font_color = rgba(200, 200, 200, 1.0)
    fade_on_empty = false
    placeholder_text = <span font_family="JetBrainsMono Nerd Font">> passphrase_</span>
    hide_input = false
    check_color = $lock_accent
    fail_color = $lock_fail
    fail_text = <span font_family="JetBrainsMono Nerd Font">[ auth failed ]</span>
    capslock_color = rgba(224, 175, 104, 1.0)
    position = 0, -16
    halign = center
    valign = center
    rounding = 0
}

# ── Box border (bottom) ─────────────────────────────────────
label {
    monitor =
    text = ╚══════════════════════════════════╝
    color = rgba(58, 58, 58, 1.0)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, -50
    halign = center
    valign = center
}

# ── Num/Caps lock indicator ────────────────────────────────
label {
    monitor =
    text = $LAYOUT[en]
    color = rgba(106, 106, 106, 0.5)
    font_size = 10
    font_family = JetBrainsMono Nerd Font
    position = -20, -20
    halign = right
    valign = top
}

# ── Hint ─────────────────────────────────────────────────────
label {
    monitor =
    text = [ passphrase or fingerprint to unlock ]
    color = rgba(106, 106, 106, 1.0)
    font_size = 11
    font_family = JetBrainsMono Nerd Font
    position = 0, -80
    halign = center
    valign = center
}

# ── Fingerprint status ──────────────────────────────────────
label {
    monitor =
    text = $FPRINTMESSAGE
    color = $lock_accent
    font_size = 11
    font_family = JetBrainsMono Nerd Font
    position = 0, -100
    halign = center
    valign = center
}

# ── Failed attempts counter ──────────────────────────────────
label {
    monitor =
    text = $ATTEMPTS[! <span foreground="#f7768e">$ATTEMPTS failed</span>]
    color = rgba(247, 118, 142, 1.0)
    font_size = 10
    font_family = JetBrainsMono Nerd Font
    position = 0, -120
    halign = center
    valign = center
}
