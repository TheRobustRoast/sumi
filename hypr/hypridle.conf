# ╔══════════════════════════════════════════════════════════════╗
# ║  Hypridle — Framework 13 AMD Power-Optimized                 ║
# ║                                                              ║
# ║  Timeline: 30s kbd off → 2m dim → 3m lock → 3.5m dpms →     ║
# ║            10m suspend                                       ║
# ║                                                              ║
# ║  Lock always happens BEFORE dpms off to prevent the          ║
# ║  "unlock flash" (seeing desktop briefly on wake).            ║
# ╚══════════════════════════════════════════════════════════════╝

general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
    ignore_dbus_inhibit = false
    ignore_systemd_inhibit = false
}

# ── Keyboard backlight off at 30s ────────────────────────────
listener {
    timeout = 30
    on-timeout = brightnessctl -sd framework_laptop::kbd_backlight set 0
    on-resume = brightnessctl -rd framework_laptop::kbd_backlight
}

# ── Dim screen at 2 min ──────────────────────────────────────
listener {
    timeout = 120
    on-timeout = brightnessctl -s set 10
    on-resume = brightnessctl -r
}

# ── Lock at 3 min ────────────────────────────────────────────
# Uses loginctl so lock-before-sleep.service also triggers
listener {
    timeout = 180
    on-timeout = loginctl lock-session
}

# ── DPMS off at 3.5 min (30s AFTER lock — prevents flash) ────
# The 30s gap ensures hyprlock is fully rendered before screen off
listener {
    timeout = 210
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# ── Suspend at 10 min ────────────────────────────────────────
# before_sleep_cmd will lock again as safety net
listener {
    timeout = 600
    on-timeout = systemctl suspend
}
