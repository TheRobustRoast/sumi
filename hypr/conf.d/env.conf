# ╔══════════════════════════════════════════════════════════════╗
# ║  Environment Variables                                      ║
# ║  Centralized env config — sourced by hyprland.conf          ║
# ╚══════════════════════════════════════════════════════════════╝

# ── XDG Session ──────────────────────────────────────────────
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# ── Cursor ───────────────────────────────────────────────────
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Bibata-Modern-Classic

# ── Qt (Wayland-native, no decorations) ──────────────────────
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_SCALE_FACTOR,1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1

# ── GTK ─────────────────────────────────────────────────────
env = GDK_BACKEND,wayland,x11
env = GDK_SCALE,2

# ── Other toolkits ──────────────────────────────────────────
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# ── AMD GPU (Radeon 780M / RDNA3 iGPU) ──────────────────────
env = LIBVA_DRIVER_NAME,radeonsi
env = VDPAU_DRIVER,radeonsi
env = AMD_VULKAN_ICD,RADV

# ── SSH Agent (optional, uncomment if using ssh-agent) ────────
# env = SSH_AUTH_SOCK,$XDG_RUNTIME_DIR/ssh-agent.socket

# ── BEMENU/Other fallback theming (dark background) ──────────
env = BEMENU_OPTS,--tb '#0a0a0a' --tf '#c8c8c8' --fb '#0a0a0a' --ff '#c8c8c8'
