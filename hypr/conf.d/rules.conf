windowrulev2 = size 600 300, title:^(cava)$
windowrulev2 = size 80% 70%, title:^(yazi)$
windowrulev2 = size 80% 70%, title:^(btop)$
windowrulev2 = size 900 600, title:^(lazygit)$
windowrulev2 = size 500 400, title:^(control-center)$
windowrulev2 = size 700 500, title:^(ncdu)$
windowrulev2 = size 700 500, title:^(clipboard)$
windowrulev2 = size 700 500, title:^(window-switcher)$
windowrulev2 = size 600 500, title:^(emoji-picker)$
windowrulev2 = size 700 500, title:^(notification-center)$
windowrulev2 = size 600 400, title:^(screenshot-picker)$
windowrulev2 = size 600 400, title:^(screen-record)$
windowrulev2 = size 400 300, title:^(power-menu)$
windowrulev2 = size 80% 80%, title:^(keybinds)$

