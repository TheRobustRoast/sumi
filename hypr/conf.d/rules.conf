# ╔══════════════════════════════════════════════════════════════╗
# ║  Window Rules — TUI-first                                  ║
# ╚══════════════════════════════════════════════════════════════╝

# ── Float + size + center (TUI apps in floating foot windows) ─
windowrule = match:title ^(impala)$,              float on, size 700 500, center on
windowrule = match:title ^(bluetuith)$,           float on, size 700 500, center on
windowrule = match:title ^(pulsemixer)$,          float on, size 600 400, center on
windowrule = match:title ^(cava)$,                float on, size 600 300, center on
windowrule = match:title ^(yazi)$,                float on, size 80% 70%, center on
windowrule = match:title ^(btop)$,                float on, size 80% 70%, center on
windowrule = match:title ^(lazygit)$,             float on, size 900 600, center on
windowrule = match:title ^(control-center)$,      float on, size 500 400, center on
windowrule = match:title ^(ncdu)$,                float on, size 700 500, center on
windowrule = match:title ^(clipboard)$,           float on, size 700 500, center on
windowrule = match:title ^(window-switcher)$,     float on, size 700 500, center on
windowrule = match:title ^(emoji-picker)$,        float on, size 600 500, center on
windowrule = match:title ^(notification-center)$, float on, size 700 500, center on
windowrule = match:title ^(screenshot-picker)$,   float on, size 600 400, center on
windowrule = match:title ^(screen-record)$,       float on, size 600 400, center on
windowrule = match:title ^(power-menu)$,          float on, size 400 300, center on
windowrule = match:title ^(keybinds)$,            float on, size 80% 80%, center on

# ── Class-based floats ────────────────────────────────────────
windowrule = match:class ^(imv)$,                                    float on
windowrule = match:class ^(xdg-desktop-portal-gtk)$,                 float on
windowrule = match:class ^(polkit-gnome-authentication-agent-1)$,    float on

# ── Scratchpads ───────────────────────────────────────────────
windowrule = match:title ^(scratch-term)$,    float on, size 80% 70%, center on
windowrule = match:title ^(scratch-music)$,   float on, size 600 300, center on
windowrule = match:title ^(scratch-monitor)$, float on, size 80% 70%, center on
windowrule = match:title ^(theme-toggle)$,    float on, size 500 400, center on
windowrule = match:title ^(scratch-devterm)$, float on, size 85% 75%, center on

# ── Dev tool windows ──────────────────────────────────────────
windowrule = match:title ^(project-launcher)$, float on, size 800 600, center on
windowrule = match:title ^(git-worktree)$,     float on, size 700 500, center on
windowrule = match:title ^(scratch-note)$,     float on, size 80% 80%, center on
windowrule = match:title ^(dotsync)$,          float on, size 600 500, center on

# ── Opacity (slight transparency for that TUI vibe) ──────────
windowrule = match:class ^(foot)$,   opacity 0.92 0.88
windowrule = match:class ^(fuzzel)$, opacity 0.95 0.90

# ── Workspace assignments ─────────────────────────────────────
# ws1:term (default), ws2:web, ws3:code, ws4:docs, ws5:chat
windowrule = match:class ^(firefox)$,               workspace 2 silent
windowrule = match:class ^(chromium)$,              workspace 2 silent
windowrule = match:class ^(code-url-handler)$,      workspace 3 silent
windowrule = match:class ^(Code)$,                  workspace 3 silent
windowrule = match:class ^(org\.pwmt\.zathura)$,    workspace 4 silent
windowrule = match:class ^(libreoffice-.*)$,        workspace 4 silent
windowrule = match:class ^(discord)$,               workspace 5 silent
windowrule = match:class ^(Element)$,               workspace 5 silent
windowrule = match:class ^(org\.telegram\.desktop)$, workspace 5 silent

# ── Floating overrides for specific apps ─────────────────────
windowrule = match:class ^(pavucontrol)$,        float on
windowrule = match:class ^(nm-connection-editor)$, float on
windowrule = match:class ^(blueman-manager)$,    float on
windowrule = match:title ^(File Upload)$,        float on, size 900 600, center on
windowrule = match:title ^(Open File)$,          float on, size 900 600, center on
windowrule = match:title ^(Save As)$,            float on, size 900 600, center on
windowrule = match:title ^(Confirm to replace)$, float on

# ── PiP (picture-in-picture) sticky + always-on-top ──────────
windowrule = match:title ^(Picture-in-Picture)$, float on, pin on, size 480 270, move 100%-490 100%-280, opacity 1.0 override 1.0 override

# ── Tearing rules (gaming / video — immediate frame present) ─
windowrule = match:class ^(steam_app_.*)$,  immediate on
windowrule = match:class ^(gamescope)$,     immediate on
windowrule = match:class ^(mpv)$,           immediate on
windowrule = match:title ^(.*YouTube.*)$,   immediate on

# ── No blur for fullscreen (save iGPU frames) ────────────────
windowrule = match:fullscreen true, no_blur on

# ── Inhibit idle for fullscreen video ────────────────────────
windowrule = match:class ^(firefox)$, idleinhibit fullscreen
windowrule = match:class ^(mpv)$,     idleinhibit fullscreen

# ── Suppress maximize events ──────────────────────────────────
windowrule = match:class .*, suppress_event maximize

# ── Layer rules ──────────────────────────────────────────────
layerrule = blur, waybar
layerrule = blur, launcher
layerrule = ignorezero, waybar
layerrule = ignorezero, launcher
layerrule = animation fade, waybar
layerrule = animation slide, launcher
