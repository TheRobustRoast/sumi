windowrulev2 = center, title:^(scratch-music)$
windowrulev2 = center, title:^(scratch-monitor)$
windowrulev2 = center, title:^(theme-toggle)$
windowrulev2 = float, title:^(scratch-devterm)$
windowrulev2 = size 85% 75%, title:^(scratch-devterm)$
windowrulev2 = center, title:^(scratch-devterm)$

# ── Dev tool windows ──────────────────────────────────────
windowrulev2 = float, title:^(project-launcher)$
windowrulev2 = float, title:^(git-worktree)$
windowrulev2 = float, title:^(scratch-note)$
windowrulev2 = float, title:^(dotsync)$
windowrulev2 = size 800 600, title:^(project-launcher)$
windowrulev2 = size 700 500, title:^(git-worktree)$
windowrulev2 = size 80% 80%, title:^(scratch-note)$
windowrulev2 = size 600 500, title:^(dotsync)$
windowrulev2 = center, title:^(project-launcher)$
windowrulev2 = center, title:^(git-worktree)$
windowrulev2 = center, title:^(scratch-note)$
windowrulev2 = center, title:^(dotsync)$

# ── Opacity (slight transparency for that TUI vibe) ─────────
windowrulev2 = opacity 0.92 0.88, class:^(foot)$
windowrulev2 = opacity 0.95 0.90, class:^(fuzzel)$

# ── Workspace assignments ────────────────────────────────────
# ws1:term (default), ws2:web, ws3:code, ws4:docs, ws5:chat
windowrulev2 = workspace 2 silent, class:^(firefox)$
windowrulev2 = workspace 2 silent, class:^(chromium)$
windowrulev2 = workspace 3 silent, class:^(code-url-handler)$
windowrulev2 = workspace 3 silent, class:^(Code)$
windowrulev2 = workspace 4 silent, class:^(org\.pwmt\.zathura)$
windowrulev2 = workspace 4 silent, class:^(libreoffice-.*)$
windowrulev2 = workspace 5 silent, class:^(discord)$
windowrulev2 = workspace 5 silent, class:^(Element)$
windowrulev2 = workspace 5 silent, class:^(org\.telegram\.desktop)$

# ── Floating overrides for specific apps ────────────────────
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, title:^(File Upload)$
windowrulev2 = float, title:^(Open File)$
windowrulev2 = float, title:^(Save As)$
windowrulev2 = float, title:^(Confirm to replace)$
windowrulev2 = size 900 600, title:^(File Upload)$
windowrulev2 = size 900 600, title:^(Open File)$
windowrulev2 = size 900 600, title:^(Save As)$
windowrulev2 = center, title:^(File Upload)$
windowrulev2 = center, title:^(Open File)$
windowrulev2 = center, title:^(Save As)$

# ── PiP (picture-in-picture) sticky + always-on-top ──────────
windowrulev2 = pin, title:^(Picture-in-Picture)$
windowrulev2 = size 480 270, title:^(Picture-in-Picture)$
windowrulev2 = move 100%-490 100%-280, title:^(Picture-in-Picture)$
windowrulev2 = opacity 1.0 override 1.0 override, title:^(Picture-in-Picture)$

# ── Tearing rules (gaming / video — immediate frame present) ─
windowrulev2 = immediate, class:^(steam_app_.*)$
windowrulev2 = immediate, class:^(gamescope)$
windowrulev2 = immediate, class:^(mpv)$
windowrulev2 = immediate, title:^(.*YouTube.*)$

# ── No blur for fullscreen (save iGPU frames) ──────────────
windowrulev2 = noblur, fullscreen:1

# ── Inhibit idle for fullscreen video ──────────────────────
windowrulev2 = idleinhibit fullscreen, class:^(firefox)$
windowrulev2 = idleinhibit fullscreen, class:^(mpv)$

# ── XWayland apps at 2x ────────────────────────────────────
windowrulev2 = suppressevent maximize, class:.*

# ── Layer rules ──────────────────────────────────────────────
layerrule = blur, waybar
layerrule = blur, launcher
layerrule = ignorezero, waybar
layerrule = ignorezero, launcher
layerrule = animation fade, waybar
layerrule = animation slide, launcher
