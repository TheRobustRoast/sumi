windowrulev2 = center, title:^(notification-center)$
windowrulev2 = center, title:^(screenshot-picker)$
windowrulev2 = center, title:^(screen-record)$
windowrulev2 = center, title:^(power-menu)$
windowrulev2 = center, title:^(keybinds)$

# ── Scratchpad sizing (special workspace floats) ───────────
windowrulev2 = float, title:^(scratch-term)$
windowrulev2 = float, title:^(scratch-music)$
windowrulev2 = float, title:^(scratch-monitor)$
windowrulev2 = float, title:^(theme-toggle)$
