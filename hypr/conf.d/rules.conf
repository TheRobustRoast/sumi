# ╔══════════════════════════════════════════════════════════════╗
# ║  Window Rules — TUI-first                                  ║
# ╚══════════════════════════════════════════════════════════════╝

# ── Float rules (TUI apps in floating foot windows) ─────────
windowrule = float, title:^(impala)$
windowrule = float, title:^(bluetuith)$
windowrule = float, title:^(pulsemixer)$
windowrule = float, title:^(cava)$
windowrule = float, title:^(yazi)$
windowrule = float, title:^(btop)$
windowrule = float, title:^(lazygit)$
windowrule = float, title:^(control-center)$
windowrule = float, title:^(ncdu)$
windowrule = float, title:^(clipboard)$
windowrule = float, title:^(window-switcher)$
windowrule = float, title:^(emoji-picker)$
windowrule = float, title:^(notification-center)$
windowrule = float, title:^(screenshot-picker)$
windowrule = float, title:^(screen-record)$
windowrule = float, title:^(power-menu)$
windowrule = float, title:^(keybinds)$
windowrule = float, class:^(imv)$
windowrule = float, title:^(Picture-in-Picture)$
windowrule = float, class:^(xdg-desktop-portal-gtk)$
windowrule = float, class:^(polkit-gnome-authentication-agent-1)$

# ── Size constraints for TUI float windows ───────────────────
windowrule = size 700 500, title:^(impala)$
windowrule = size 700 500, title:^(bluetuith)$
windowrule = size 600 400, title:^(pulsemixer)$
windowrule = size 600 300, title:^(cava)$
windowrule = size 80% 70%, title:^(yazi)$
windowrule = size 80% 70%, title:^(btop)$
windowrule = size 900 600, title:^(lazygit)$
windowrule = size 500 400, title:^(control-center)$
windowrule = size 700 500, title:^(ncdu)$
windowrule = size 700 500, title:^(clipboard)$
windowrule = size 700 500, title:^(window-switcher)$
windowrule = size 600 500, title:^(emoji-picker)$
windowrule = size 700 500, title:^(notification-center)$
windowrule = size 600 400, title:^(screenshot-picker)$
windowrule = size 600 400, title:^(screen-record)$
windowrule = size 400 300, title:^(power-menu)$
windowrule = size 80% 80%, title:^(keybinds)$

# ── Center TUI floats ───────────────────────────────────────
windowrule = center, title:^(impala)$
windowrule = center, title:^(bluetuith)$
windowrule = center, title:^(pulsemixer)$
windowrule = center, title:^(cava)$
windowrule = center, title:^(yazi)$
windowrule = center, title:^(btop)$
windowrule = center, title:^(lazygit)$
windowrule = center, title:^(control-center)$
windowrule = center, title:^(ncdu)$
windowrule = center, title:^(clipboard)$
windowrule = center, title:^(window-switcher)$
windowrule = center, title:^(emoji-picker)$
windowrule = center, title:^(notification-center)$
windowrule = center, title:^(screenshot-picker)$
windowrule = center, title:^(screen-record)$
windowrule = center, title:^(power-menu)$
windowrule = center, title:^(keybinds)$

# ── Scratchpad sizing (special workspace floats) ───────────
windowrule = float, title:^(scratch-term)$
windowrule = float, title:^(scratch-music)$
windowrule = float, title:^(scratch-monitor)$
windowrule = float, title:^(theme-toggle)$
windowrule = size 80% 70%, title:^(scratch-term)$
windowrule = size 600 300, title:^(scratch-music)$
windowrule = size 80% 70%, title:^(scratch-monitor)$
windowrule = size 500 400, title:^(theme-toggle)$
windowrule = center, title:^(scratch-term)$
windowrule = center, title:^(scratch-music)$
windowrule = center, title:^(scratch-monitor)$
windowrule = center, title:^(theme-toggle)$
windowrule = float, title:^(scratch-devterm)$
windowrule = size 85% 75%, title:^(scratch-devterm)$
windowrule = center, title:^(scratch-devterm)$

# ── Dev tool windows ──────────────────────────────────────
windowrule = float, title:^(project-launcher)$
windowrule = float, title:^(git-worktree)$
windowrule = float, title:^(scratch-note)$
windowrule = float, title:^(dotsync)$
windowrule = size 800 600, title:^(project-launcher)$
windowrule = size 700 500, title:^(git-worktree)$
windowrule = size 80% 80%, title:^(scratch-note)$
windowrule = size 600 500, title:^(dotsync)$
windowrule = center, title:^(project-launcher)$
windowrule = center, title:^(git-worktree)$
windowrule = center, title:^(scratch-note)$
windowrule = center, title:^(dotsync)$

# ── Opacity (slight transparency for that TUI vibe) ─────────
windowrule = opacity 0.92 0.88, class:^(foot)$
windowrule = opacity 0.95 0.90, class:^(fuzzel)$

# ── Workspace assignments ────────────────────────────────────
# ws1:term (default), ws2:web, ws3:code, ws4:docs, ws5:chat
windowrule = workspace 2 silent, class:^(firefox)$
windowrule = workspace 2 silent, class:^(chromium)$
windowrule = workspace 3 silent, class:^(code-url-handler)$
windowrule = workspace 3 silent, class:^(Code)$
windowrule = workspace 4 silent, class:^(org\.pwmt\.zathura)$
windowrule = workspace 4 silent, class:^(libreoffice-.*)$
windowrule = workspace 5 silent, class:^(discord)$
windowrule = workspace 5 silent, class:^(Element)$
windowrule = workspace 5 silent, class:^(org\.telegram\.desktop)$

# ── Floating overrides for specific apps ────────────────────
windowrule = float, class:^(pavucontrol)$
windowrule = float, class:^(nm-connection-editor)$
windowrule = float, class:^(blueman-manager)$
windowrule = float, title:^(File Upload)$
windowrule = float, title:^(Open File)$
windowrule = float, title:^(Save As)$
windowrule = float, title:^(Confirm to replace)$
windowrule = size 900 600, title:^(File Upload)$
windowrule = size 900 600, title:^(Open File)$
windowrule = size 900 600, title:^(Save As)$
windowrule = center, title:^(File Upload)$
windowrule = center, title:^(Open File)$
windowrule = center, title:^(Save As)$

# ── PiP (picture-in-picture) sticky + always-on-top ──────────
windowrule = pin, title:^(Picture-in-Picture)$
windowrule = size 480 270, title:^(Picture-in-Picture)$
windowrule = move 100%-490 100%-280, title:^(Picture-in-Picture)$
windowrule = opacity 1.0 override 1.0 override, title:^(Picture-in-Picture)$

# ── Tearing rules (gaming / video — immediate frame present) ─
windowrule = immediate, class:^(steam_app_.*)$
windowrule = immediate, class:^(gamescope)$
windowrule = immediate, class:^(mpv)$
windowrule = immediate, title:^(.*YouTube.*)$

# ── No blur for fullscreen (save iGPU frames) ──────────────
windowrule = noblur, fullscreen:1

# ── Inhibit idle for fullscreen video ──────────────────────
windowrule = idleinhibit fullscreen, class:^(firefox)$
windowrule = idleinhibit fullscreen, class:^(mpv)$

# ── XWayland apps at 2x ────────────────────────────────────
windowrule = suppressevent maximize, class:.*

# ── Layer rules ──────────────────────────────────────────────
layerrule = blur, waybar
layerrule = blur, launcher
layerrule = ignorezero, waybar
layerrule = ignorezero, launcher
layerrule = animation fade, waybar
layerrule = animation slide, launcher
