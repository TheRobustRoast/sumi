# ╔══════════════════════════════════════════════════════════════╗
# ║  Autostart                                                  ║
# ╚══════════════════════════════════════════════════════════════╝

# ── System environment (MUST be first) ─────────────────────────
# Export critical env vars to dbus + systemd for portals & apps
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP HYPRLAND_INSTANCE_SIGNATURE
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP PATH HYPRLAND_INSTANCE_SIGNATURE
exec-once = systemctl --user start hyprland-session.target

# ── XDG Desktop Portal (needs env vars exported first) ─────────
exec-once = sleep 1 && systemctl --user restart xdg-desktop-portal-hyprland.service

# ── Wallpaper & Theme ────────────────────────────────────────
exec-once = hyprpaper
exec-once = sleep 0.5 && ~/.config/hypr/scripts/wallpaper-init.sh

# ── First-run bootstrap (generates starter wallpapers if none exist) ──
exec-once = sleep 2 && ~/.config/hypr/scripts/first-run.sh

# ── Bar & Notifications ─────────────────────────────────────
exec-once = waybar
exec-once = dunst

# ── Auth agent ─────────────────────────────────────────────────
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# ── Clipboard ────────────────────────────────────────────────
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# ── Idle ─────────────────────────────────────────────────────
exec-once = hypridle

# ── Named Scratchpads ────────────────────────────────────────
# Spawn minimized into special workspaces, toggled with F1-F4
exec-once = [workspace special:term silent]   foot -T scratch-term
exec-once = [workspace special:music silent]  foot -T scratch-music -e cava
exec-once = [workspace special:monitor silent] foot -T scratch-monitor -e btop
exec-once = [workspace special:devterm silent] foot -T scratch-devterm -e tmux new-session -A -s dev
