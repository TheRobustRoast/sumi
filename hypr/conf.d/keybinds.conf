# ╔══════════════════════════════════════════════════════════════╗
# ║  Keybinds — SUPER as mod, vim-style, all TUI                ║
# ╚══════════════════════════════════════════════════════════════╝

$mod = SUPER

# ── Core ─────────────────────────────────────────────────────
bind = $mod, Return, exec, foot
bind = $mod, Q, killactive
bind = $mod, D, exec, fuzzel
bind = $mod, R, exec, fuzzel --launch-prefix='foot -e'
bind = $mod, V, togglefloating
bind = $mod, F, fullscreen, 0
bind = $mod SHIFT, F, fullscreen, 1
bind = $mod, P, pseudo
bind = $mod, S, togglesplit
bind = $mod, O, pin                    # pin floating window on top

# ── Focus (vim) ──────────────────────────────────────────────
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d
bind = $mod, U, focusurgentorlast      # jump to urgent window

# ── Move windows (vim) ──────────────────────────────────────
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, J, movewindow, d
bind = $mod SHIFT, Return, layoutmsg, swapwithmaster master
bind = $mod, space, layoutmsg, orientationcycle left top

# ── Resize (quick) ─────────────────────────────────────────
binde = $mod CTRL, H, resizeactive, -40 0
binde = $mod CTRL, L, resizeactive, 40 0
binde = $mod CTRL, K, resizeactive, 0 -40
binde = $mod CTRL, J, resizeactive, 0 40

# ── Resize submap (modal — SUPER+CTRL+R to enter) ─────────
bind = $mod CTRL, R, submap, resize
submap = resize
binde = , H, resizeactive, -30 0
binde = , L, resizeactive, 30 0
binde = , K, resizeactive, 0 -30
binde = , J, resizeactive, 0 30
binde = , left, resizeactive, -30 0
binde = , right, resizeactive, 30 0
binde = , up, resizeactive, 0 -30
binde = , down, resizeactive, 0 30
bind = , Return, submap, reset
bind = , Escape, submap, reset
submap = reset

# ── Groups / Tabs ──────────────────────────────────────────
bind = $mod, W, submap, group
submap = group
bind = , G, togglegroup                 # create/dissolve group
bind = , H, moveintogroup, l            # absorb left window
bind = , L, moveintogroup, r            # absorb right window
bind = , K, moveintogroup, u
bind = , J, moveintogroup, d
bind = , N, changegroupactive, f        # next tab
bind = , P, changegroupactive, b        # prev tab
bind = , O, moveoutofgroup              # eject from group
bind = , Return, submap, reset
bind = , Escape, submap, reset
submap = reset

# ── Workspaces ───────────────────────────────────────────────
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# ── Move to workspace ───────────────────────────────────────
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# ── Move to workspace (silent — don't follow) ────────────
bind = $mod ALT, 1, movetoworkspacesilent, 1
bind = $mod ALT, 2, movetoworkspacesilent, 2
bind = $mod ALT, 3, movetoworkspacesilent, 3
bind = $mod ALT, 4, movetoworkspacesilent, 4
bind = $mod ALT, 5, movetoworkspacesilent, 5
bind = $mod ALT, 6, movetoworkspacesilent, 6
bind = $mod ALT, 7, movetoworkspacesilent, 7
bind = $mod ALT, 8, movetoworkspacesilent, 8
bind = $mod ALT, 9, movetoworkspacesilent, 9
bind = $mod ALT, 0, movetoworkspacesilent, 10

# ── Named Scratchpads (special workspaces) ─────────────────
bind = $mod, grave, togglespecialworkspace, magic
bind = $mod SHIFT, grave, movetoworkspace, special:magic
bind = $mod, F1, togglespecialworkspace, term
bind = $mod, F2, togglespecialworkspace, music
bind = $mod, F3, togglespecialworkspace, monitor

# ── Scratchpad auto-spawn rules (in autostart.conf) ────────
# See autostart.conf for the exec-once commands that spawn these

# ── Mouse ────────────────────────────────────────────────────
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

# ── TUI Apps (all launch inside foot) ───────────────────────
bind = $mod, E, exec, foot -T yazi -e yazi
bind = $mod, I, exec, foot -T impala -e impala
bind = $mod, B, exec, foot -T bluetuith -e bluetuith
bind = $mod, A, exec, foot -T pulsemixer -e pulsemixer
bind = $mod, T, exec, foot -T btop -e btop
bind = $mod, M, exec, foot -T cava -e cava
bind = $mod SHIFT, D, exec, foot -T ncdu -e ncdu ~
bind = $mod, G, exec, foot -T lazygit -e lazygit
bind = $mod, X, exec, foot -T control-center -e ~/.config/hypr/scripts/control-center.sh

# ── TUI Pickers (fzf-based, all inside foot) ──────────────
bind = $mod SHIFT, V, exec, foot -T clipboard -e ~/.config/hypr/scripts/clipboard.sh pick
bind = $mod, Tab, exec, foot -T window-switcher -e ~/.config/hypr/scripts/window-switcher.sh
bind = $mod, period, exec, foot -T emoji-picker -e ~/.config/hypr/scripts/emoji-picker.sh
bind = $mod SHIFT, N, exec, foot -T notification-center -e ~/.config/hypr/scripts/notification-center.sh

# ── Screenshots ────────────────────────────────────────────
bind = $mod SHIFT, S, exec, ~/.config/hypr/scripts/screenshot.sh area
bind = $mod, Print, exec, ~/.config/hypr/scripts/screenshot.sh full
bind = $mod SHIFT, Print, exec, ~/.config/hypr/scripts/screenshot.sh area-save
bind = $mod ALT, S, exec, foot -T screenshot-picker -e ~/.config/hypr/scripts/screenshot.sh pick
bind = $mod ALT, Print, exec, ~/.config/hypr/scripts/screenshot.sh window

# ── Screen Recording ──────────────────────────────────────
bind = $mod ALT, R, exec, ~/.config/hypr/scripts/screen-record.sh area
bind = $mod ALT SHIFT, R, exec, foot -T screen-record -e ~/.config/hypr/scripts/screen-record.sh pick

# ── Power ──────────────────────────────────────────────────
bind = $mod SHIFT, E, exec, foot -T power-menu -e ~/.config/hypr/scripts/power-menu.sh
bind = $mod SHIFT, X, exec, hyprlock

# ── Wallpaper ──────────────────────────────────────────────
bind = $mod SHIFT, W, exec, ~/.config/hypr/scripts/wallpaper-select.sh
bind = $mod ALT, W, exec, ~/.config/hypr/scripts/wallpaper-random.sh
bind = $mod SHIFT, T, exec, foot -T theme-toggle -e ~/.config/hypr/scripts/theme-toggle.sh

# ── Utilities ────────────────────────────────────────────────
bind = $mod, N, exec, dunstctl close
bind = $mod, equal, exec, ~/.config/hypr/scripts/fuzzel-calc.sh
bind = $mod, C, exec, hyprpicker -a
bind = $mod SHIFT, C, exec, hyprctl reload  # reload config
# Media keys with OSD (visual bar in dunst notification)
binde = , XF86MonBrightnessUp, exec, ~/.config/hypr/scripts/osd.sh brightness-up
binde = , XF86MonBrightnessDown, exec, ~/.config/hypr/scripts/osd.sh brightness-down
binde = , XF86AudioRaiseVolume, exec, ~/.config/hypr/scripts/osd.sh volume-up
binde = , XF86AudioLowerVolume, exec, ~/.config/hypr/scripts/osd.sh volume-down
bind = , XF86AudioMute, exec, ~/.config/hypr/scripts/osd.sh volume-mute
bind = , XF86AudioMicMute, exec, ~/.config/hypr/scripts/osd.sh mic-mute
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

# ── Modes ──────────────────────────────────────────────────
bind = $mod, F5, exec, ~/.config/hypr/scripts/gaming-mode.sh
bind = $mod, F6, exec, ~/.config/hypr/scripts/focus-mode.sh

# ── Waybar toggle ─────────────────────────────────────────
bind = $mod, F9, exec, pkill -SIGUSR1 waybar

# ── Cheatsheet ────────────────────────────────────────────
bind = $mod, slash, exec, foot -T keybinds -e ~/.config/hypr/scripts/keybinds-cheatsheet.sh

# ── Monitor hotplug ───────────────────────────────────────
bind = $mod, F7, exec, ~/.config/hypr/scripts/monitor-hotplug.sh

# ── Dev Tools ──────────────────────────────────────────────
bind = $mod SHIFT, P, exec, foot -T project-launcher -e ~/.config/hypr/scripts/project-launcher.sh
bind = $mod SHIFT, G, exec, foot -T git-worktree -e ~/.config/hypr/scripts/git-worktree.sh
bind = $mod ALT, Return, exec, foot -e tmux new-session -A -s main
bind = $mod SHIFT, M, exec, foot -T scratch-note -e ~/.config/hypr/scripts/scratch-note.sh
bind = $mod ALT, D, exec, foot -T dotsync -e ~/.config/hypr/scripts/dotfile-sync.sh

# ── Dev Scratchpads ───────────────────────────────────────
bind = $mod, F4, togglespecialworkspace, devterm
bind = $mod SHIFT, F4, movetoworkspace, special:devterm

# ── Global shortcuts (passthrough to apps) ─────────────────
bind = $mod, F10, pass, ^(com\.obsproject\.Studio)$
bind = $mod, F11, pass, ^(discord)$
