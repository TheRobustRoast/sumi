# ╔══════════════════════════════════════════════════════════════╗
# ║  Hyprpaper — wallpaper daemon config                       ║
# ╚══════════════════════════════════════════════════════════════╝

# IPC for wallpaper-apply.sh to set wallpapers dynamically
ipc = on

# Preload nothing at start — wallpaper-init.sh handles it
# splash = false

# Preload and set handled by scripts via hyprctl hyprpaper commands:
#   hyprctl hyprpaper preload <path>
#   hyprctl hyprpaper wallpaper "eDP-1,<path>"
#   hyprctl hyprpaper unload unused
