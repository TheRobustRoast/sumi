# ╔══════════════════════════════════════════════════════════════╗
# ║  Hyprpaper — wallpaper daemon config                       ║
# ╚══════════════════════════════════════════════════════════════╝

# IPC for sumi wallpaper apply to set wallpapers dynamically
ipc = on

# Preload nothing at start — sumi wallpaper init handles it
# splash = false

# Preload and set handled by sumi via hyprctl hyprpaper commands:
#   hyprctl hyprpaper preload <path>
#   hyprctl hyprpaper wallpaper "eDP-1,<path>"
#   hyprctl hyprpaper unload unused
