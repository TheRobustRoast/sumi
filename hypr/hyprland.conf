# ╔══════════════════════════════════════════════════════════════╗
# ║  sumi — Framework 13 AMD · 2.8K · Monochrome + Accent     ║
# ║  Optimized for Ryzen 7840U / Radeon 780M RDNA3 iGPU       ║
# ╚══════════════════════════════════════════════════════════════╝

# ── Sources ──────────────────────────────────────────────────
source = ~/.config/hypr/conf.d/colors.conf
source = ~/.config/hypr/conf.d/env.conf
source = ~/.config/hypr/conf.d/keybinds.conf
source = ~/.config/hypr/conf.d/rules.conf
source = ~/.config/hypr/conf.d/autostart.conf

# ── Monitor (Framework 13 2.8K panel) ────────────────────────
# Internal: 2880x1920@120Hz, 2x integer scaling → 1440x960 logical
# Integer scaling = massive perf gain on iGPU vs fractional
monitor = eDP-1, 2880x1920@120, 0x0, 2
# External monitors: auto-detect, position to the right
monitor = , preferred, auto-right, 1

# ── Render (RDNA3 iGPU optimized) ───────────────────────────
render {
    direct_scanout = true
}

# ── Cursor (hardware cursor for zero GPU overhead) ───────────
cursor {
    no_hardware_cursors = false
    enable_hyprcursor = true
    no_break_fs_vrr = true
}

# ── General ──────────────────────────────────────────────────
general {
    gaps_in = 3
    gaps_out = 6
    border_size = 2
    col.active_border = $accent $accent_dim 45deg
    col.inactive_border = $surface0
    layout = dwindle
    resize_on_border = true
    allow_tearing = true
}

# ── Decoration (tuned for iGPU power efficiency) ─────────────
decoration {
    rounding = 0

    blur {
        enabled = true
        size = 4
        passes = 2
        new_optimizations = true
        xray = false
        noise = 0.01
        popups = true
        popups_ignorealpha = 0.6
    }

    shadow {
        enabled = false
    }
}

# ── Animations ───────────────────────────────────────────────
# Snappy, mechanical — matches the boxy TUI vibe
# Per-action tuning: windows pop in, slide between workspaces, layers instant
animations {
    enabled = true
    animation = monitorAdded, 0

    # Curves — fast-in, minimal overshoot, mechanical feel
    bezier = snap, 0.16, 1.0, 0.3, 1.0          # general snappy
    bezier = pop, 0.05, 0.9, 0.1, 1.05           # subtle overshoot for opens
    bezier = slide, 0.1, 1.0, 0.15, 1.0          # lateral movement
    bezier = fadeIn, 0.0, 0.0, 0.2, 1.0          # smooth opacity ramp
    bezier = instant, 0.0, 1.0, 0.0, 1.0         # near-instant

    # Windows — pop in from 85%, snap out fast
    animation = windowsIn, 1, 3, pop, popin 85%
    animation = windowsOut, 1, 2, snap, popin 85%
    animation = windowsMove, 1, 3, slide, slide

    # Fading
    animation = fadeIn, 1, 2, fadeIn
    animation = fadeOut, 1, 2, snap
    animation = fadeSwitch, 1, 2, snap
    animation = fadeDim, 1, 3, fadeIn

    # Borders — instant color transitions
    animation = border, 1, 4, instant
    animation = borderangle, 1, 30, default, loop

    # Workspaces — vertical slide matches trackpad swipe
    animation = workspaces, 1, 3, slide, slidevert
    animation = specialWorkspace, 1, 3, pop, slidefadevert -30%

    # Layers (waybar, fuzzel, dunst) — fast, never laggy
    animation = layers, 1, 2, instant, fade
    animation = layersIn, 1, 2, pop, fade
    animation = layersOut, 1, 1, instant, fade
}

# ── Input ────────────────────────────────────────────────────
input {
    kb_layout = us
    kb_options = caps:escape
    follow_mouse = 1
    sensitivity = 0
    accel_profile = adaptive
    touchpad {
        natural_scroll = true
        tap-to-click = true
        disable_while_typing = true
        clickfinger_behavior = true
        scroll_factor = 0.7
        drag_lock = true
        tap-and-drag = true
    }
}

# ── Gestures (Framework trackpad is great for these) ─────────
# 0.51+: workspace_swipe* removed, replaced with gesture = keyword
gesture = 3, horizontal, workspace

# ── Layout ───────────────────────────────────────────────────
dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2
    smart_split = false
    smart_resizing = true
}

master {
    new_status = master
}

# ── Group ────────────────────────────────────────────────────
group {
    col.border_active = $accent
    col.border_inactive = $surface0

    groupbar {
        enabled = true
        font_family = JetBrainsMono Nerd Font
        font_size = 10
        height = 18
        col.active = $accent
        col.inactive = $surface1
        text_color = $bg
        rounding = 0
        gaps_in = 2
        gaps_out = 2
    }
}

# ── Misc (perf critical) ────────────────────────────────────
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    vfr = true
    vrr = 1
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    animate_manual_resizes = false
    animate_mouse_windowdragging = false
    on_focus_under_fullscreen = 2
    initial_workspace_tracking = 1
    focus_on_activate = true
    close_special_on_empty = true
}

# ── Binds ────────────────────────────────────────────────────
binds {
    workspace_back_and_forth = true
    allow_workspace_cycles = true
    scroll_event_delay = 100
}

# ── Xwayland ─────────────────────────────────────────────────
xwayland {
    force_zero_scaling = true
}

# ── Framework 13 specific ───────────────────────────────────
# Lid switch handling (suspend on close)
bindl = , switch:on:Lid Switch, exec, systemctl suspend

# ── Debug (uncomment to troubleshoot) ──────────────────────
# debug {
