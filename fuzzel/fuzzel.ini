# ╔══════════════════════════════════════════════════════════════╗
# ║  Fuzzel — Boxy TUI Launcher                                 ║
# ╚══════════════════════════════════════════════════════════════╝

[main]
font=JetBrainsMono Nerd Font:size=13
dpi-aware=auto
prompt=> _
icon-theme=hicolor
icons-enabled=no
terminal=foot -e
layer=overlay
lines=12
width=30
horizontal-pad=12
vertical-pad=8
inner-pad=4
line-height=22
letter-spacing=0
match-mode=fzf

[border]
width=2
radius=0

[dmenu]
exit-immediately-if-empty=no

# ── Colors (overridden by wallust template at runtime) ────────
# These are the fallback monochrome defaults
# Wallust writes to ~/.config/fuzzel/colors.ini — include it
include=~/.config/fuzzel/colors.ini

[colors]
background=0a0a0aee
text=c8c8c8ff
match=7aa2f7ff
selection=1a1a1aff
selection-text=c8c8c8ff
selection-match=7aa2f7ff
border=7aa2f7ff
prompt=7aa2f7ff
input=c8c8c8ff
counter=3a3a3aff
