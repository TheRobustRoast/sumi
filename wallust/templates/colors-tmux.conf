# wallust-generated tmux colors — sourced by tmux.conf
# accent from wallpaper, grayscale base stays fixed

# Statusbar
set -g status-style "bg=#1a1a1a,fg=#6a6a6a"
set -g status-left "#[fg={{color4}},bg=#1a1a1a,bold] [#S] #[fg=#3a3a3a]│ "
setw -g window-status-current-format "#[fg=#0a0a0a,bg={{color4}},bold] #I:#W "

# Pane borders
set -g pane-active-border-style "fg={{color4}}"

# Message
set -g message-command-style "bg=#1a1a1a,fg={{color4}}"
