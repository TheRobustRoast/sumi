# ╔══════════════════════════════════════════════════════════════╗
# ║  Starship Prompt — Boxy Monochrome + Accent                  ║
# ╚══════════════════════════════════════════════════════════════╝

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$python\
$rust\
$nodejs\
$cmd_duration\
$battery\
$status\
$line_break\
$character"""

add_newline = true

[character]
success_symbol = "[>](bold cyan)"
error_symbol = "[>](bold red)"
vimcmd_symbol = "[<](bold cyan)"

[username]
format = "[$user]($style)@"
style_user = "dimmed white"
show_always = false

[hostname]
format = "[$hostname]($style):"
style = "dimmed white"
ssh_only = true

[status]
format = "[$status]($style) "
style = "red"
disabled = false

[battery]
disabled = false
format = "[$percentage]($style) "

[[battery.display]]
threshold = 15
style = "bold red"

[[battery.display]]
threshold = 30
style = "dimmed yellow"

[directory]
format = "[$path]($style)[$read_only]($read_only_style) "
style = "bold white"
read_only = " [ro]"
read_only_style = "red"
truncation_length = 3
truncation_symbol = ".../"
home_symbol = "~"

[git_branch]
format = "[$symbol$branch]($style) "
symbol = ""
style = "dimmed cyan"
truncation_length = 20

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "dimmed white"
conflicted = "[!${count}](red)"
ahead = "[+${count}](cyan)"
behind = "[-${count}](dimmed white)"
diverged = "[+${ahead_count}/-${behind_count}](yellow)"
untracked = "[?${count}](dimmed white)"
stashed = "[*${count}](dimmed white)"
modified = "[~${count}](yellow)"
staged = "[+${count}](green)"
renamed = "[r${count}](dimmed cyan)"
deleted = "[x${count}](red)"

[cmd_duration]
format = "[$duration]($style) "
style = "dimmed white"
min_time = 2_000
show_milliseconds = false

[python]
format = '[py:${version}]($style) '
style = "dimmed green"

[rust]
format = '[rs:${version}]($style) '
style = "dimmed red"

[nodejs]
format = '[js:${version}]($style) '
style = "dimmed yellow"

[package]
disabled = true

[aws]
disabled = true

[gcloud]
disabled = true

[kubernetes]
disabled = true
